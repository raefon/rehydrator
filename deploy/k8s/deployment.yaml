apiVersion: apps/v1
kind: Deployment
metadata:
  name: rehydrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rehydrator
  template:
    metadata:
      labels:
        app: rehydrator
    spec:
      containers:
        - name: rehydrator
          image: ghcr.io/YOUR_ORG/rehydrator:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--config"
            - "/config/rehydrator.yaml"
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: postgres-url
            - name: RADARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: radarr-api-key
            - name: SONARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: sonarr-api-key
            - name: TORBOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: torbox-api-key
          volumeMounts:
            - name: rehydrator-config
              mountPath: /config
              readOnly: true
            - name: media
              mountPath: /storage/media
      volumes:
        - name: rehydrator-config
          configMap:
            name: rehydrator-config
        - name: media
          persistentVolumeClaim:
            claimName: media
