apiVersion: v1
kind: ConfigMap
metadata:
  name: rehydrator-config
data:
  rehydrator.yaml: |
    tenant: tenet-nofear101
    radarr:
      url: http://tenet-radarr:7878
    sonarr:
      url: http://tenet-sonarr:8989
    seerr:
      url: http://tenet-seerr:5055
      api_key: ""
      sync:
        enabled: false
        interval_seconds: 120
        limit: 100
    decypharr:
      url: http://tenet-decypharr:8282
      radarr_category: radarr
      sonarr_category: sonarr
      # Add/re-arm goes through Decypharr. Prune/delete goes directly to TorBox.
      delete_files_on_prune: true
    torbox:
      api_key: ""
    csi_path: /storage/media
    health_addr: ":8080"
    api:
      enabled: true
      token: ""
      require_token: true
    metrics:
      enabled: true
    playback:
      enabled: true
      rearm_on_play: true
      cooldown_seconds: 60
      ignored_titles:
        - rehydrator-preroll
      ignored_title_contains:
        - preroll
        - pre-roll
    plex:
      enabled: false
      url: http://tenet-plex:32400
      token: ""
      movie_section_id: 0
      refresh_after_rearm: true
      refresh_after_visibility: true
      refresh_after_prune: false
      refresh_delay_seconds: 45
      refresh_timeout_seconds: 20
      max_refreshes_per_run: 5
    radarr_sync:
      enabled: true
      interval_seconds: 60
    prune_enabled: true
    rearm_enabled: true
    max_prunes_per_run: 5
    max_rearms_per_run: 3
    prune_wait_for_csi_gone: false
    rearm_short_circuit_if_csi_visible: false
    reconcile_interval_seconds: 30
    csi_wait_seconds: 900
    csi:
      visibility_timeout_seconds: 900
      visibility_poll_seconds: 10
      visibility_retry_seconds: 60
    provider_cooldown_seconds: 900
    rclone_rc:
      enabled: false
      url: http://localhost:5572
      username: ""
      password: ""
      refresh_after_rearm: false
      timeout_seconds: 10
    cache_grace_hours: 24
    max_retries: 10
    concurrent_workers: 2
    db_auto_migrate: true
