apiVersion: apps/v1
kind: Deployment
metadata:
  name: rehydrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rehydrator
  template:
    metadata:
      labels:
        app: rehydrator
    spec:
      containers:
        - name: rehydrator
          image: ghcr.io/YOUR_ORG/rehydrator:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--config"
            - "/config/rehydrator.yaml"
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: TENANT_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: postgres-url
            - name: RADARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: radarr-api-key
            - name: SONARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: sonarr-api-key
            - name: SEERR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: seerr-api-key
                  optional: true
            - name: DECYPHARR_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: decypharr-username
                  optional: true
            - name: DECYPHARR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: decypharr-password
                  optional: true
            - name: TORBOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: torbox-api-key
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: api-token
            - name: PLEX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: plex-token
                  optional: true
            - name: HEALTH_ADDR
              value: ":8080"
            - name: API_ENABLED
              value: "true"
            - name: API_REQUIRE_TOKEN
              value: "true"
            - name: METRICS_ENABLED
              value: "true"
            - name: PLAYBACK_ENABLED
              value: "true"
            - name: PLAYBACK_REARM_ON_PLAY
              value: "true"
            - name: PLAYBACK_COOLDOWN_SECONDS
              value: "60"
            - name: PLAYBACK_IGNORED_TITLES
              value: "rehydrator-preroll"
            - name: PLAYBACK_IGNORED_TITLE_CONTAINS
              value: "preroll,pre-roll"
            - name: PLEX_ENABLED
              value: "false"
            - name: PLEX_URL
              value: "http://tenet-plex:32400"
            - name: PLEX_MOVIE_SECTION_ID
              value: "0"
            - name: PLEX_REFRESH_AFTER_REARM
              value: "true"
            - name: PLEX_REFRESH_AFTER_VISIBILITY
              value: "true"
            - name: PLEX_REFRESH_AFTER_PRUNE
              value: "false"
            - name: PLEX_REFRESH_DELAY_SECONDS
              value: "45"
            - name: PLEX_REFRESH_TIMEOUT_SECONDS
              value: "20"
            - name: RADARR_SYNC_ENABLED
              value: "true"
            - name: RADARR_SYNC_INTERVAL_SECONDS
              value: "60"
            - name: SEERR_URL
              value: "http://tenet-seerr:5055"
            - name: SEERR_SYNC_ENABLED
              value: "false"
            - name: SEERR_SYNC_INTERVAL_SECONDS
              value: "120"
            - name: SEERR_SYNC_LIMIT
              value: "100"
            - name: PRUNE_ENABLED
              value: "true"
            - name: REARM_ENABLED
              value: "true"
            - name: MAX_PRUNES_PER_RUN
              value: "5"
            - name: MAX_REARMS_PER_RUN
              value: "3"
            - name: PRUNE_WAIT_FOR_CSI_GONE
              value: "false"
            - name: REARM_SHORT_CIRCUIT_IF_CSI_VISIBLE
              value: "false"
            - name: RECONCILE_INTERVAL_SECONDS
              value: "30"
            - name: CSI_WAIT_SECONDS
              value: "900"
            - name: CSI_VISIBILITY_TIMEOUT_SECONDS
              value: "900"
            - name: CSI_VISIBILITY_POLL_SECONDS
              value: "10"
            - name: CSI_VISIBILITY_RETRY_SECONDS
              value: "60"
            - name: PROVIDER_COOLDOWN_SECONDS
              value: "900"
            - name: RCLONE_RC_ENABLED
              value: "false"
            - name: RCLONE_RC_URL
              value: "http://localhost:5572"
            - name: RCLONE_RC_REFRESH_AFTER_REARM
              value: "false"
            - name: RCLONE_RC_TIMEOUT_SECONDS
              value: "10"
            - name: CONCURRENT_WORKERS
              value: "2"
          volumeMounts:
            - name: rehydrator-config
              mountPath: /config
              readOnly: true
            - name: media
              mountPath: /storage/media
      volumes:
        - name: rehydrator-config
          configMap:
            name: rehydrator-config
        - name: media
          persistentVolumeClaim:
            claimName: media
