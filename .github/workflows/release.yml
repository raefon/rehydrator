name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build binaries and create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build binaries
        run: |
          mkdir -p dist

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -o dist/rehydrator-linux-amd64 ./cmd/rehydrator

          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -o dist/rehydrator-linux-arm64 ./cmd/rehydrator

          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -o dist/rehydrator-darwin-arm64 ./cmd/rehydrator

          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            dist/* \
            --title "$TAG_NAME" \
            --generate-notes