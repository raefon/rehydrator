apiVersion: apps/v1
kind: Deployment
metadata:
  name: rehydrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rehydrator
  template:
    metadata:
      labels:
        app: rehydrator
    spec:
      containers:
        - name: rehydrator
          image: ghcr.io/YOUR_ORG/rehydrator:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--config"
            - "/config/rehydrator.yaml"
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: postgres-url
            - name: RADARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: radarr-api-key
            - name: SONARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: sonarr-api-key
            - name: DECYPHARR_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: decypharr-username
                  optional: true
            - name: DECYPHARR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rehydrator-secrets
                  key: decypharr-password
                  optional: true
            - name: HEALTH_ADDR
              value: ":8080"
          volumeMounts:
            - name: rehydrator-config
              mountPath: /config
              readOnly: true
            - name: media
              mountPath: /storage/media
      volumes:
        - name: rehydrator-config
          configMap:
            name: rehydrator-config
        - name: media
          persistentVolumeClaim:
            claimName: media
