tenant: tenet-nofear101

health_addr: ":8080"
db_auto_migrate: true

csi_path: /storage/media

# Main reconcile loop
reconcile_interval_seconds: 30
cache_grace_hours: 24
max_retries: 10
concurrent_workers: 2

# Re-arm / prune safety limits
prune_enabled: true
rearm_enabled: true
max_prunes_per_run: 5
max_rearms_per_run: 3

# Provider delete is authoritative. CSI/rclone may show stale paths after prune.
prune_wait_for_csi_gone: false

# ARCHIVED + rearm_requested should queue Decypharr even if CSI still shows the path.
rearm_short_circuit_if_csi_visible: false

# Legacy/default CSI wait. Keep aligned with csi.visibility_timeout_seconds.
csi_wait_seconds: 900

